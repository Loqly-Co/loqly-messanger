version: "3"
services:

  postgres-main:
    image: postgres:14.1
    container_name: msg_main_postgres
    ports:
      - ${MAINPG_PORT}:5432
    environment:
      POSTGRES_DB: ${MAINPG_DB}
      POSTGRES_USER: main_pg
      POSTGRES_PASSWORD: ${MAINPG_PASSWORD}
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/1_init-db.sql
  
