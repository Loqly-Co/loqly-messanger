  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: msg_minio
    ports:
      - ${MINIO_PORT}:9000
      - ${MINIO_ADMIN_PORT}:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./minio_data:/data
    command: server --console-address :9001 /data && mc mb myminio/test
  
  redis:
    image: redis:7.4.1
    container_name: msg_redis
    hostname: ${REDIS_HOST}
    ports:
      - ${REDIS_PORT}:6379
  
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: msg_rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
      - "${RABBITMQ_STOMP_PORT}:61613"
      - "${RABBITMQ_WEB_STOMP_PORT}:15674"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USR}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PWD}"
    volumes: 
      - "rabbitmq_data:/var/lib/rabbitmq"
    command: >
      bash -c "
        rabbitmq-plugins enable --offline rabbitmq_stomp &&
        rabbitmq-plugins enable --offline rabbitmq_web_stomp &&
        rabbitmq-server
      "

volumes:
  rabbitmq_data: